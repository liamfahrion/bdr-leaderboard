<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDR Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f2f5;
      --card:       #ffffff;
      --border:     rgba(0, 0, 0, 0.07);
      --red:        #e53935;
      --red-light:  #fdecea;
      --red-mid:    #ef5350;
      --green:      #22c55e;
      --green-dim:  #16a34a;
      --amber:      #f59e0b;
      --text:       #111827;
      --text-2:     #374151;
      --text-3:     #6b7280;
      --text-4:     #9ca3af;
      --shadow-sm:  0 1px 2px rgba(0,0,0,0.08);
      --shadow:     0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --font:       'Space Grotesk', system-ui, -apple-system, sans-serif;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 4.5rem;
      flex-shrink: 0;
      z-index: 10;
    }

    .hdr-left {
      display: flex;
      align-items: baseline;
      gap: 0.9rem;
    }

    .hdr-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--red);
      letter-spacing: -0.02em;
    }

    .hdr-sep {
      width: 1px;
      height: 1.1rem;
      background: var(--border);
      flex-shrink: 0;
      align-self: center;
    }

    .hdr-period {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hdr-dayinfo {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-4);
    }

    .hdr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
    }

    #clock {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    #status {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #status.fresh   { color: var(--green-dim); }
    #status.stale   { color: #d97706; }
    #status.loading { color: var(--text-4); }

    /* ── MAIN ────────────────────────────────────────────── */
    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.75rem 0.85rem;
      gap: 0.85rem;
      overflow: hidden;
    }

    /* ── LOADING ─────────────────────────────────────────── */
    #loading-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-4);
    }

    /* ── STATS STRIP ─────────────────────────────────────── */
    #stats-strip {
      display: none;
      gap: 0.85rem;
      flex-shrink: 0;
    }

    .s-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 0.9rem 1.2rem;
    }

    .s-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-4);
      margin-bottom: 0.45rem;
    }

    /* Team goal panel */
    #sp-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sp-number-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .sp-current {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--red);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
    }

    .sp-of-goal {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-3);
    }

    .sp-bar-track {
      height: 7px;
      background: var(--red-light);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 0.55rem;
    }

    .sp-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 9999px;
      min-width: 4px;
      transition: width 0.8s ease;
    }

    .sp-meta-row {
      display: flex;
      gap: 1.75rem;
    }

    .sp-meta {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
    }

    .sp-meta-lbl {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-4);
    }

    .sp-meta-val {
      font-size: 1.05rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .sp-meta-val.red   { color: var(--red); }
    .sp-meta-val.green { color: var(--green-dim); }

    /* Motivation panel */
    #sp-quote {
      width: 290px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #quote-body {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-2);
      line-height: 1.55;
      font-style: italic;
      margin-bottom: 0.4rem;
    }

    #quote-attr {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── CARD GRID ───────────────────────────────────────── */
    #grid {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 0.75rem;
      flex: 1;
      min-height: 0;
      align-content: start;
    }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 0.9rem 0.9rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    /* top row: avatar left, rank badge right */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }

    .rank-badge {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--text-3);
      background: var(--bg);
      border-radius: 6px;
      padding: 0.18rem 0.45rem;
      letter-spacing: 0.04em;
    }
    .rank-badge.top { background: #fef3c7; color: #92400e; }

    /* avatar */
    .c-photo {
      display: block;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: var(--shadow-sm);
    }

    .c-initials {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--red), #b71c1c);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    /* name */
    .c-name {
      font-size: clamp(0.85rem, 1vw, 1rem);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* points: big number + "of X pts" */
    .c-metric {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      margin-top: 0.1rem;
    }

    .c-pts {
      font-size: clamp(1.8rem, 2.5vw, 2.8rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
    }

    .c-pts-goal {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-3);
    }

    /* progress bar */
    .c-bar-track {
      height: 5px;
      background: var(--red-light);
      border-radius: 9999px;
      overflow: hidden;
      margin: 0.15rem 0;
    }

    .c-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 9999px;
      min-width: 3px;
      transition: width 0.8s ease;
    }

    /* pct + badge row */
    .c-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.05rem;
    }

    .c-pct {
      font-size: clamp(1.2rem, 1.6vw, 1.8rem);
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .c-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 0.25rem 0.6rem;
      color: #fff;
      white-space: nowrap;
    }
    .c-badge.on-pace  { background: var(--green); }
    .c-badge.tracking { background: var(--amber); }
    .c-badge.behind   { background: var(--red-mid); }

    /* pace delta */
    .c-delta {
      font-size: 0.63rem;
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .c-delta.pos { color: var(--green-dim); }
    .c-delta.neg { color: var(--red-mid); }
  </style>
</head>
<body>

<header>
  <div class="hdr-left">
    <span class="hdr-title">BDR Leaderboard</span>
    <div class="hdr-sep"></div>
    <span class="hdr-period" id="hdr-period"></span>
    <div class="hdr-sep"></div>
    <span class="hdr-dayinfo" id="hdr-dayinfo"></span>
  </div>
  <div class="hdr-right">
    <div id="clock"></div>
    <div id="status" class="loading">Loading…</div>
  </div>
</header>

<main>
  <div id="loading-msg">Fetching leaderboard data…</div>

  <div id="stats-strip" style="display:none">
    <div class="s-panel" id="sp-team">
      <div class="s-label" id="sp-team-label">Monthly BDR Team Goal</div>
      <div class="sp-number-row">
        <span class="sp-current" id="sp-current">—</span>
        <span class="sp-of-goal" id="sp-of-goal">of — pts</span>
      </div>
      <div class="sp-bar-track">
        <div class="sp-bar-fill" id="sp-bar" style="width:0%"></div>
      </div>
      <div class="sp-meta-row">
        <div class="sp-meta">
          <span class="sp-meta-lbl">Attainment</span>
          <span class="sp-meta-val red" id="sp-att">—</span>
        </div>
        <div class="sp-meta">
          <span class="sp-meta-lbl">Gap vs Pace</span>
          <span class="sp-meta-val" id="sp-gap">—</span>
        </div>
        <div class="sp-meta">
          <span class="sp-meta-lbl">On Pace</span>
          <span class="sp-meta-val" id="sp-onpace">—</span>
        </div>
        <div class="sp-meta">
          <span class="sp-meta-lbl">Through Month</span>
          <span class="sp-meta-val" id="sp-through">—</span>
        </div>
      </div>
    </div>
    <div class="s-panel" id="sp-quote">
      <div class="s-label">Daily Motivation</div>
      <div id="quote-body"></div>
      <div id="quote-attr"></div>
    </div>
  </div>

  <div id="grid" style="display:none"></div>
</main>

<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════
const TITLE_LABEL     = "Q2 2026";
const REFRESH_MS      = 5 * 60 * 1000;
const SHEET_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtTd0Lq_yg1_Dhqdownv-Q7y9PJ5d-4oFTYcFYNwUhaAvbU19A67H1Rzv86Sr5yWQxO_C71R1piOaI/pub?gid=1893078768&single=true&output=csv";
const HIDE_ZERO_POINT = true;
const DEFAULT_GOAL    = 30;
const PHOTOS = {
  "Dalynn":  "photos/dalynn.jpg",
  "Mike":    "photos/mike.jpg",
  "Danicka": "photos/danicka.jpg",
  "Jackson": "photos/jackson.jpg",
  "Ringo":   "photos/ringo.jpg",
  "Delaney": "photos/delaney.jpg",
  "Charles": "photos/charles.jpg",
  "Jake":    "photos/jake.jpg",
  "Wyatt":   "photos/wyatt.jpg",
};

const QUOTES = [
  { text: "It ain't about how hard you hit. It's about how hard you can get hit and keep moving forward.", author: "Rocky Balboa" },
  { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { text: "I never dreamed about success. I worked for it.", author: "Estée Lauder" },
  { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
  { text: "The harder I work, the luckier I get.", author: "Samuel Goldwyn" },
  { text: "Every strike brings me closer to the next home run.", author: "Babe Ruth" },
  { text: "Your attitude, not your aptitude, will determine your altitude.", author: "Zig Ziglar" },
  { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
  { text: "The difference between ordinary and extraordinary is that little extra.", author: "Jimmy Johnson" },
  { text: "Hustle in silence and let your success make the noise.", author: "Unknown" },
  { text: "Sales are contingent upon the attitude of the salesman, not the attitude of the prospect.", author: "W. Clement Stone" },
  { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
];

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
const PHOTO_MAP = Object.fromEntries(
  Object.entries(PHOTOS).map(([k, v]) => [k.toLowerCase().trim(), v])
);
let lastData = null;
let prevPts  = {};

// ══════════════════════════════════════════════════════════════════
//  STATIC INIT (runs once on load)
// ══════════════════════════════════════════════════════════════════
document.getElementById('hdr-period').textContent = TITLE_LABEL;

// Day-through-month info
(function() {
  const now   = new Date();
  const dim   = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const day   = now.getDate();
  const pct   = Math.round((day / dim) * 100);
  document.getElementById('hdr-dayinfo').textContent = `Day ${day} of ${dim} · ${pct}% through month`;
  document.getElementById('sp-through').textContent  = pct + '%';
  document.getElementById('sp-team-label').textContent =
    `Monthly BDR Team Goal — ${TITLE_LABEL}`;
})();

// Daily quote (rotates by day-of-year so it changes each morning)
(function() {
  const dy = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  const q  = QUOTES[dy % QUOTES.length];
  document.getElementById('quote-body').textContent = '“' + q.text + '”';
  document.getElementById('quote-attr').textContent = '— ' + q.author;
})();

// ══════════════════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════════════════
function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
}
tickClock();
setInterval(tickClock, 1000);

// ══════════════════════════════════════════════════════════════════
//  CSV PARSER  — handles quoted fields containing commas
// ══════════════════════════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else { field += c; }
    } else {
      if      (c === '"')  { inQ = true; }
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (row.length || field !== '') { row.push(field); rows.push(row); }
  return rows;
}

// ══════════════════════════════════════════════════════════════════
//  DATA PARSER  — header-driven BDR block extraction
// ══════════════════════════════════════════════════════════════════
function parseReps(rows) {
  let hi = -1, nc = -1, pc = -1, gc = -1, pipc = -1;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const bi = r.findIndex(c => c.trim() === 'BDR');
    if (bi === -1) continue;
    hi = i; nc = bi;
    const qi = r.findIndex(c => c.trim() === 'Qualified');
    pc = qi !== -1 ? qi : bi + 1;
    const gi = r.findIndex(c => c.trim() === 'Goal');
    gc = gi !== -1 ? gi : pc + 1;
    for (let j = pc + 1; j < r.length; j++) {
      if (r[j].trim() === 'Pipeline') { pipc = j; break; }
    }
    break;
  }
  if (hi === -1) throw new Error('BDR header row not found');

  const reps = [];
  let seenData = false;
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length <= nc) continue;
    const name = (r[nc] ?? '').trim();
    if (!name) {
      if (seenData) break; // blank row after data = end of BDR block
      continue;            // blank row before first data row = skip
    }
    seenData = true;

    const pts  = parseFloat(r[pc] ?? '') || 0;
    if (HIDE_ZERO_POINT && pts === 0) continue;

    const gRaw = (r[gc]  ?? '').replace(/[^0-9.]/g, '');
    const goal = gRaw ? parseFloat(gRaw) : NaN;

    const pRaw = pipc >= 0 ? (r[pipc] ?? '').replace(/[$,\s]/g, '') : '';
    const pipe = pRaw ? parseFloat(pRaw) : 0;

    reps.push({
      name, points: pts,
      goal: (isNaN(goal) || goal <= 0) ? DEFAULT_GOAL : goal,
      pipe: isNaN(pipe) ? 0 : pipe,
    });
  }

  reps.sort((a, b) => b.points - a.points || b.pipe - a.pipe);
  console.table(reps.map(r => ({ name: r.name, points: r.points, goal: r.goal, pipeline: r.pipe })));
  return reps;
}

// ══════════════════════════════════════════════════════════════════
//  PACE CALCULATION
// ══════════════════════════════════════════════════════════════════
function getPaceInfo(points, goal) {
  const now     = new Date();
  const dim     = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const frac    = now.getDate() / dim;
  const expected = +(goal * frac).toFixed(2);
  const delta   = +(points - expected).toFixed(1);
  const ratio   = expected > 0 ? points / expected : 1;
  const status  = ratio >= 0.9 ? 'on-pace' : ratio >= 0.65 ? 'tracking' : 'behind';
  return { status, delta, expected };
}

const BADGE_LABEL = { 'on-pace': 'On Pace', tracking: 'Tracking', behind: 'Behind' };

// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════
function fmt(n) { return Number.isInteger(n) ? String(n) : n.toFixed(1); }

function getPhoto(name) { return PHOTO_MAP[name.toLowerCase().trim()] ?? null; }

function initials(name) {
  const p = name.trim().split(/\s+/);
  return p.length > 1 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
}

// ══════════════════════════════════════════════════════════════════
//  COUNT-UP ANIMATION
// ══════════════════════════════════════════════════════════════════
function animateNum(el, from, to, dur = 900) {
  const t0 = performance.now();
  function step(t) {
    const x = Math.min((t - t0) / dur, 1);
    const e = 1 - Math.pow(1 - x, 3);
    el.textContent = (from + (to - from) * e).toFixed(1);
    if (x < 1) requestAnimationFrame(step);
    else el.textContent = to.toFixed(1);
  }
  requestAnimationFrame(step);
}

// ══════════════════════════════════════════════════════════════════
//  AVATAR
// ══════════════════════════════════════════════════════════════════
function makeAvatar(name, size) {
  const url = getPhoto(name);
  if (url) {
    const img = document.createElement('img');
    img.className = 'c-photo';
    img.src = url; img.alt = name;
    img.style.cssText = `width:${size}px;height:${size}px`;
    img.onerror = () => img.replaceWith(makeInitialsEl(name, size));
    return img;
  }
  return makeInitialsEl(name, size);
}

function makeInitialsEl(name, size) {
  const el = document.createElement('div');
  el.className = 'c-initials';
  el.textContent = initials(name);
  el.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.round(size * 0.35)}px`;
  return el;
}

// ══════════════════════════════════════════════════════════════════
//  BUILD CARD
// ══════════════════════════════════════════════════════════════════
function buildCard(rep, rank) {
  const pace = getPaceInfo(rep.points, rep.goal);
  const pct  = Math.round((rep.points / rep.goal) * 100);

  const card = document.createElement('div');
  card.className = 'card';

  // Top: avatar + rank badge
  const top = document.createElement('div');
  top.className = 'card-top';
  top.appendChild(makeAvatar(rep.name, 52));
  const badge = document.createElement('div');
  badge.className = 'rank-badge' + (rank <= 3 ? ' top' : '');
  badge.textContent = '#' + rank;
  top.appendChild(badge);
  card.appendChild(top);

  // Name
  const nameEl = document.createElement('div');
  nameEl.className = 'c-name';
  nameEl.textContent = rep.name;
  card.appendChild(nameEl);

  // Points + "of X pts"
  const metricEl = document.createElement('div');
  metricEl.className = 'c-metric';
  const ptsEl = document.createElement('span');
  ptsEl.className = 'c-pts';
  const prev = prevPts[rep.name];
  if (prev !== undefined && prev !== rep.points) {
    ptsEl.textContent = fmt(prev);
    setTimeout(() => animateNum(ptsEl, prev, rep.points), 100);
  } else {
    ptsEl.textContent = fmt(rep.points);
  }
  const goalEl = document.createElement('span');
  goalEl.className = 'c-pts-goal';
  goalEl.textContent = 'of ' + fmt(rep.goal) + ' pts';
  metricEl.append(ptsEl, goalEl);
  card.appendChild(metricEl);

  // Progress bar
  const track = document.createElement('div'); track.className = 'c-bar-track';
  const fill  = document.createElement('div'); fill.className  = 'c-bar-fill';
  fill.style.width = Math.min(100, pct) + '%';
  track.appendChild(fill);
  card.appendChild(track);

  // Percentage + status badge
  const bottom = document.createElement('div');
  bottom.className = 'c-bottom';
  const pctEl = document.createElement('div');
  pctEl.className = 'c-pct';
  pctEl.textContent = pct + '%';
  const badgeEl = document.createElement('div');
  badgeEl.className = 'c-badge ' + pace.status;
  badgeEl.textContent = BADGE_LABEL[pace.status];
  bottom.append(pctEl, badgeEl);
  card.appendChild(bottom);

  // Pace delta
  const deltaEl = document.createElement('div');
  deltaEl.className = 'c-delta ' + (pace.delta >= 0 ? 'pos' : 'neg');
  deltaEl.textContent = (pace.delta >= 0 ? '+' : '') + pace.delta.toFixed(1) + ' vs pace';
  card.appendChild(deltaEl);

  return card;
}

// ══════════════════════════════════════════════════════════════════
//  UPDATE TEAM STATS STRIP
// ══════════════════════════════════════════════════════════════════
function updateStats(reps) {
  const total     = reps.reduce((s, r) => s + r.points, 0);
  const totalGoal = reps.reduce((s, r) => s + r.goal, 0);
  const attPct    = totalGoal > 0 ? Math.round((total / totalGoal) * 100) : 0;

  const now  = new Date();
  const dim  = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const frac = now.getDate() / dim;
  const expected = totalGoal * frac;
  const gap  = +(total - expected).toFixed(1);

  const onPaceN = reps.filter(r => getPaceInfo(r.points, r.goal).status === 'on-pace').length;

  document.getElementById('sp-current').textContent  = total.toFixed(1);
  document.getElementById('sp-of-goal').textContent  = 'of ' + fmt(totalGoal) + ' pts';
  document.getElementById('sp-bar').style.width      = Math.min(100, attPct) + '%';
  document.getElementById('sp-att').textContent      = attPct + '%';

  const gapEl = document.getElementById('sp-gap');
  gapEl.textContent = (gap >= 0 ? '+' : '') + gap;
  gapEl.className   = 'sp-meta-val ' + (gap >= 0 ? 'green' : 'red');

  document.getElementById('sp-onpace').textContent   = onPaceN + ' / ' + reps.length;
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
function render(reps) {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('stats-strip').style.display = 'flex';
  document.getElementById('grid').style.display        = 'grid';

  document.getElementById('grid').innerHTML = '';

  updateStats(reps);
  for (let i = 0; i < reps.length; i++) {
    document.getElementById('grid').appendChild(buildCard(reps[i], i + 1));
  }

  for (const r of reps) prevPts[r.name] = r.points;
}

// ══════════════════════════════════════════════════════════════════
//  STATUS
// ══════════════════════════════════════════════════════════════════
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = msg;
}

// ══════════════════════════════════════════════════════════════════
//  FETCH + REFRESH
// ══════════════════════════════════════════════════════════════════
async function refresh() {
  try {
    const res = await fetch(SHEET_CSV_URL + '&_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const reps = parseReps(parseCSV(await res.text()));
    lastData = reps;
    render(reps);
    setStatus('fresh', 'Updated ' + new Date().toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit'
    }));
  } catch (err) {
    console.error('[BDR]', err);
    if (lastData) {
      setStatus('stale', 'Stale — last updated ' + new Date().toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit'
      }));
    } else {
      setStatus('stale', 'Failed to load');
      const msg = document.getElementById('loading-msg');
      msg.style.display = 'flex';
      msg.textContent = 'Failed to load data — will retry…';
    }
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
